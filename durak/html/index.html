<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAX Карты: Дурак</title>
    <style>
        /* === БАЗОВЫЕ СТИЛИ (main.css) === */
        :root {
            --bg-color: #f0f2f5;
            --text-color: #1c1e21;
            --primary-color: #007AFF;
            --secondary-color: #34C759;
            --table-color: #2E7D32;
            --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:active { transform: scale(0.98); opacity: 0.8; }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-secondary { background-color: var(--secondary-color); color: white; }
        .btn-outline { background-color: transparent; border: 2px solid #ccc; color: #555; }
        .btn-small { padding: 8px 12px; border-radius: 8px; border: none; background: rgba(0,0,0,0.5); color: white; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; padding: 0 20px; }

        /* === ЭКРАНЫ (screens.css) === */
        .screen {
            display: none;
            height: 100vh;
            width: 100%;
            flex-direction: column;
            align-items: center;
            position: absolute;
            top: 0; left: 0;
        }

        .screen.active { display: flex; }

        #hub-screen, #lobby-screen { justify-content: center; padding-bottom: 20px; }
        .logo { font-size: 32px; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 40px; }
        .lobby-info { margin-bottom: 30px; font-size: 18px; }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #ccc;
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-screen { justify-content: center; }

        /* === ИГРОВОЙ СТОЛ (game.css) === */
        #game-screen { background-color: var(--table-color); color: white; justify-content: space-between; }

        .game-header { width: 100%; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); }

        .game-table { flex-grow: 1; width: 100%; position: relative; display: flex; justify-content: center; align-items: center; }

        .card {
            width: 60px; height: 90px;
            background: white; border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            color: black; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px;
            position: absolute;
            user-select: none;
        }

        .card.red { color: #FF3B30; }
        .card-back { background: repeating-linear-gradient(45deg, #007AFF, #007AFF 10px, #005bb5 10px, #005bb5 20px); border: 2px solid white; }

        .deck-area { position: absolute; left: 20px; top: 40%; transform: translateY(-50%); }
        .trump-card { transform: rotate(90deg) translateX(30px); z-index: 1; }
        .deck-card { z-index: 2; left: 0; top: 0; }
        .cards-left { position: absolute; top: -25px; left: 30px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 10px; z-index: 3;}

        .player-hand { height: 120px; width: 100%; position: relative; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 20px; z-index: 10;}
        .player-hand .card { position: relative; margin-left: -30px; transition: transform 0.2s; cursor: pointer; }
        .player-hand .card:first-child { margin-left: 0; }
        .player-hand .card:hover { transform: translateY(-15px); }

        .game-actions { width: 100%; padding: 15px; display: flex; gap: 10px; background: rgba(0,0,0,0.3); }
        .btn-action { flex: 1; padding: 12px; }
    </style>
</head>
<body>

    <div id="loading-screen" class="screen active">
        <div class="spinner"></div>
        <h2>Загрузка...</h2>
    </div>

    <div id="hub-screen" class="screen">
        <h1 class="logo">🃏 Карты</h1>
        <p class="subtitle">Выберите режим игры</p>
        
        <div class="btn-group">
            <button class="btn btn-primary" onclick="App.selectMode('1v1')">⚔️ 1 на 1 (36 карт)</button>
            <button class="btn btn-secondary" onclick="App.selectMode('up_to_6')">👥 До 6 игроков (52 карты)</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <h2 id="lobby-title">Лобби</h2>
        <div class="lobby-info">
            <p>Статус: <span id="lobby-status">Ожидание...</span></p>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" id="btn-quick-match" onclick="App.startQuickMatch()">🚀 Быстрый матч</button>
            <button class="btn btn-secondary" id="btn-create-private" onclick="App.createPrivateRoom()">🔒 Создать приватную</button>
            <button class="btn btn-outline" onclick="App.showScreen('hub-screen')">🔙 Назад</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-header">
            <span id="opponent-info">Оппонент: 6 карт</span>
            <button class="btn-small" onclick="App.showScreen('hub-screen')">Выйти</button>
        </div>
        
        <div class="game-table" id="game-table"></div>
        
        <div class="deck-area">
            <div class="card trump-card" id="trump-card">♠️ Т</div>
            <div class="card card-back deck-card"></div>
            <span class="cards-left">24</span>
        </div>

        <div class="player-hand" id="player-hand"></div>

        <div class="game-actions">
            <button class="btn btn-secondary btn-action" onclick="Game.takeCards()">Взять</button>
            <button class="btn btn-primary btn-action" onclick="Game.passTurn()">Бито</button>
        </div>
    </div>

    <script>
        // === API ЛОГИКА ===
        const API = {
            async mockRequest(data, delay = 800) {
                return new Promise(resolve => setTimeout(() => resolve(data), delay));
            },
            async joinMatchmaking(mode) {
                return this.mockRequest({ status: 'success', roomId: 'room_123' });
            },
            async createPrivateRoom(mode) {
                return this.mockRequest({ status: 'success', roomId: 'priv_456', inviteLink: 'https://max.ru/bot?start=priv_456' });
            }
        };

        // === WEBSOCKET ЛОГИКА ===
        const WS = {
            connect(roomId) {
                setTimeout(() => {
                    App.showScreen('game-screen');
                    Game.initMockGame();
                }, 1000);
            },
            sendAction(action, payload) {
                console.log(`[WS] Отправлено: ${action}`, payload);
            }
        };

        // === ИГРОВАЯ ЛОГИКА ===
        const Game = {
            handContainer: document.getElementById('player-hand'),
            tableContainer: document.getElementById('game-table'),

            initMockGame() {
                this.handContainer.innerHTML = '';
                this.tableContainer.innerHTML = '';
                
                const mockCards = ['♠️ 6', '♥️ 8', '♣️ Д', '♦️ Т', '♠️ 10', '♥️ К'];
                
                mockCards.forEach((cardData) => {
                    const cardEl = document.createElement('div');
                    cardEl.className = `card ${cardData.includes('♥️') || cardData.includes('♦️') ? 'red' : ''}`;
                    cardEl.innerText = cardData;
                    cardEl.onclick = () => this.playCard(cardEl, cardData);
                    this.handContainer.appendChild(cardEl);
                });
            },

            playCard(cardElement, cardData) {
                WS.sendAction('attack_card', { card: cardData });
                this.tableContainer.appendChild(cardElement);
                
                cardElement.style.position = 'absolute';
                cardElement.style.margin = '0';
                cardElement.style.left = `calc(50% - 30px + ${Math.random() * 40 - 20}px)`; 
                cardElement.style.top = `calc(50% - 45px + ${Math.random() * 40 - 20}px)`;
                cardElement.style.transform = `rotate(${Math.random() * 30 - 15}deg)`;
                cardElement.onclick = null; 
            },

            takeCards() {
                WS.sendAction('take_cards', {});
                alert('Вы забрали карты (отправлено на сервер)');
            },

            passTurn() {
                WS.sendAction('done', {});
                alert('Бито / Передача хода (отправлено на сервер)');
            }
        };

        // === УПРАВЛЕНИЕ ПРИЛОЖЕНИЕМ ===
        const App = {
            currentMode: null,

            init() {
                const maxApp = window.Telegram?.WebApp || window.MaxApp;
                if (maxApp) {
                    maxApp.ready();
                    if (maxApp.expand) maxApp.expand();
                }
                setTimeout(() => {
                    this.showScreen('hub-screen');
                }, 600);
            },

            showScreen(screenId) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(screenId).classList.add('active');
            },

            selectMode(mode) {
                this.currentMode = mode;
                const modeText = mode === '1v1' ? '1 на 1' : 'До 6 игроков';
                document.getElementById('lobby-title').innerText = `Лобби (${modeText})`;
                this.showScreen('lobby-screen');
            },

            async startQuickMatch() {
                const btn = document.getElementById('btn-quick-match');
                const status = document.getElementById('lobby-status');
                btn.disabled = true;
                status.innerText = 'Поиск соперника...';

                try {
                    const response = await API.joinMatchmaking(this.currentMode);
                    WS.connect(response.roomId);
                } catch (e) {
                    alert('Ошибка поиска игры');
                } finally {
                    btn.disabled = false;
                    status.innerText = 'Ожидание...';
                }
            },

            async createPrivateRoom() {
                try {
                    const response = await API.createPrivateRoom(this.currentMode);
                    alert(`Комната создана!\nСсылка для друга: ${response.inviteLink}`);
                    WS.connect(response.roomId);
                } catch (e) {
                    alert('Ошибка создания комнаты');
                }
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            App.init();
        });
    </script>
</body>
</html>
